url: https://willju-wangqian.github.io/ggpaintr/
template:
  bootstrap: 5
home:
  title: ggpaintr
  description: Build formula-driven Shiny apps for ggplot2.
reference:
  - title: Start here
    contents:
      - ptr_app
      - ptr_app_bslib
  - title: Configuration
    desc: Set package-wide defaults that apply to every app in the session.
    contents:
      - ptr_options
  - title: Shiny integration
    desc: Embed ggpaintr inside a larger Shiny app while keeping package-owned runtime behavior.
    contents:
      - ptr_module_ui
      - ptr_module_server
      - ptr_server
      - ptr_build_ids
      - ptr_server_state
      - ptr_setup_controls
      - ptr_register_draw
      - ptr_register_plot
      - ptr_register_error
      - ptr_register_code
      - ptr_extract_plot
      - ptr_extract_error
      - ptr_extract_code
      - ptr_gg_extra
      - ptr_input_ui
      - ptr_output_ui
  - title: Placeholder extensibility
    desc: Register and reuse supported custom placeholder types without editing package internals.
    contents:
      - ptr_define_placeholder
      - ptr_merge_placeholders
      - ptr_missing_expr
  - title: Data preparation
    contents:
      - ptr_normalize_column_names
  - title: Advanced runtime
    desc: Low-level helpers intentionally exported for advanced tests, tooling, and custom runtime workflows.
    contents:
      - ptr_parse_formula
      - ptr_runtime_input_spec
      - ptr_exec
      - ptr_assemble_plot
  - title: Copy customization
    contents:
      - ptr_merge_ui_text
      - ptr_resolve_ui_text
  - title: LLM integration
    desc: Expose ggpaintr's documentation bundle to ellmer-backed coding assistants.
    contents:
      - ptr_llm_primer
      - ptr_llm_topic
      - ptr_llm_topics
      - ptr_llm_register
articles:
  - title: Guides
    navbar: ggpaintr
    contents:
      - ggpaintr-workflow
      - ggpaintr-extensibility
      - ggpaintr-placeholder-registry
      - ggpaintr-llm
