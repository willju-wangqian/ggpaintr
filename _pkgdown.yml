url: https://willju-wangqian.github.io/ggpaintr/
template:
  bootstrap: 5
home:
  title: ggpaintr
  description: Build formula-driven Shiny apps for ggplot2.
reference:
  - title: End users
    desc: Turn a ggplot-style formula into a ready-to-run Shiny app, and configure session-wide defaults and data prep.
    contents:
      - ptr_app
      - ptr_app_bslib
      - ptr_app_grid
      - ptr_options
      - ptr_normalize_column_names
      - ptr_ui_text
  - title: Shiny embedders
    desc: Drop ggpaintr's generated controls and outputs into a larger Shiny app while keeping the package-owned runtime.
    contents:
      - ptr_module_ui
      - ptr_module_server
      - ptr_controls_ui
      - ptr_outputs_ui
      - ptr_server
  - title: Advanced embedders
    desc: Drive the typed tree programmatically, test with shiny::testServer, or own the plot/code/error outputs.
    contents:
      - ptr_init_state
      - ptr_register_plot
      - ptr_register_error
      - ptr_register_code
      - ptr_extract_plot
      - ptr_extract_error
      - ptr_extract_code
      - ptr_gg_extra
      - ptr_resolve_ui_text
  - title: Placeholder authors
    desc: Register supported custom placeholder types and their UI hooks without editing package internals.
    contents:
      - ptr_define_placeholder_value
      - ptr_define_placeholder_consumer
      - ptr_define_placeholder_source
      - build_ui_for
  - title: LLM tooling
    desc: Expose ggpaintr's documentation bundle to ellmer-backed coding assistants.
    contents:
      - ptr_llm_primer
      - ptr_llm_topic
      - ptr_llm_topics
      - ptr_llm_register
articles:
  - title: Guides
    navbar: ggpaintr
    contents:
      - ggpaintr-use-cases
      - ggpaintr-customization
      - ggpaintr-safety
      - ggpaintr-gallery
      - ggpaintr-llm
