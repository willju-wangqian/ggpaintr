url: https://willju-wangqian.github.io/ggpaintr/
template:
  bootstrap: 5
home:
  title: ggpaintr
  description: Build formula-driven Shiny apps for ggplot2.
reference:
  - title: Start here
    contents:
      - ggpaintr_app
      - generate_shiny
  - title: Shiny integration
    desc: Embed ggpaintr inside a larger Shiny app while keeping package-owned runtime behavior.
    contents:
      - ggpaintr_server
      - ggpaintr_ids
      - ggpaintr_server_state
      - ggpaintr_bind_control_panel
      - ggpaintr_bind_draw
      - ggpaintr_bind_export
      - ggpaintr_bind_plot
      - ggpaintr_bind_error
      - ggpaintr_bind_code
      - ggpaintr_plot_value
      - ggpaintr_error_value
      - ggpaintr_code_value
      - ggpaintr_controls_ui
      - ggpaintr_outputs_ui
  - title: Placeholder extensibility
    desc: Register and reuse supported custom placeholder types without editing package internals.
    contents:
      - ggpaintr_placeholder
      - ggpaintr_effective_placeholders
      - ggpaintr_missing_expr
  - title: Data preparation
    contents:
      - ggpaintr_normalize_column_names
  - title: Advanced runtime
    desc: Low-level helpers intentionally exported for advanced tests, tooling, and custom runtime workflows.
    contents:
      - ggpaintr_formula
      - ggpaintr_runtime_input_spec
      - ggpaintr_build_runtime
      - ggpaintr_get_plot
  - title: Copy customization
    contents:
      - ggpaintr_effective_copy_rules
      - ggpaintr_resolve_copy
articles:
  - title: Guides
    navbar: ggpaintr
    contents:
      - ggpaintr-workflow
      - ggpaintr-extensibility
      - ggpaintr-placeholder-registry
