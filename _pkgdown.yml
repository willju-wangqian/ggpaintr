url: https://willju-wangqian.github.io/ggpaintr/
template:
  bootstrap: 5
home:
  title: ggpaintr
  description: Build formula-driven Shiny apps for ggplot2.
reference:
  - title: Start here
    contents:
      - ptr_app
      - ptr_generate_shiny
  - title: Shiny integration
    desc: Embed ggpaintr inside a larger Shiny app while keeping package-owned runtime behavior.
    contents:
      - ptr_server
      - ptr_build_ids
      - ptr_server_state
      - ptr_register_controls
      - ptr_register_draw
      - ptr_register_export
      - ptr_register_plot
      - ptr_register_error
      - ptr_register_code
      - ptr_extract_plot
      - ptr_extract_error
      - ptr_extract_code
      - ptr_input_ui
      - ptr_output_ui
  - title: Placeholder extensibility
    desc: Register and reuse supported custom placeholder types without editing package internals.
    contents:
      - ptr_define_placeholder
      - ptr_merge_placeholders
      - ptr_missing_expr
  - title: Data preparation
    contents:
      - ptr_normalize_column_names
  - title: Advanced runtime
    desc: Low-level helpers intentionally exported for advanced tests, tooling, and custom runtime workflows.
    contents:
      - ptr_parse_formula
      - ptr_runtime_input_spec
      - ptr_exec
      - ptr_assemble_plot
  - title: Copy customization
    contents:
      - ptr_merge_ui_text
      - ptr_resolve_ui_text
articles:
  - title: Guides
    navbar: ggpaintr
    contents:
      - ggpaintr-workflow
      - ggpaintr-extensibility
      - ggpaintr-placeholder-registry
