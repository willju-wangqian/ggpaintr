url: https://willju-wangqian.github.io/ggpaintr/
template:
  bootstrap: 5
home:
  title: ggpaintr
  description: Build formula-driven Shiny apps for ggplot2.
reference:
  - title: L1 — All-in-one
    desc: Turn a ggplot-style formula into a ready-to-run Shiny app with one call to `ptr_app()`.
    contents:
      - ptr_app
  - title: RStudio addin
    desc: Wrap a highlighted selection in a placeholder from the RStudio command palette.
    contents:
      - ptr_wrap_placeholder_addin
  - title: Formula placeholders
    desc: The `pp*` tokens you write inside a formula — the value/consumer/source controls plus the structural toggles.
    contents:
      - pp_placeholders
      - ppLayerOff
      - ppVerbSwitch
  - title: Session configuration
    desc: Process-wide defaults, column-name normalisation, and UI copy overrides.
    contents:
      - ptr_options
      - ptr_normalize_column_names
      - ptr_ui_text
  - title: L2 — Embed with the default layout
    desc: Plug ggpaintr into your own Shiny app with its self-contained default layout. The module pair is the L2 entry; the shared coordinator (`ptr_shared()` → `ptr_shared_panel()` + `ptr_shared_server()`) links a cross-formula key across plots. See `vignette("ggpaintr-tutorial")` § "Multiple plots, and writing your own Shiny app".
    contents:
      - ptr_ui
      - ptr_server
      - ptr_shared
      - ptr_shared_panel
      - ptr_shared_server
  - title: L3 — Own the layout / render path
    desc: Own every piece of ggpaintr's public UI — bare builders (no behaviour flags) plus nestable combinators. Compose freely under your own Shiny (optionally `ptr_ui_page()`) and wire with `ptr_server()`. See `vignette("ggpaintr-tutorial")`.
    contents:
      - ptr_ui_page
      - ptr_ui_header
      - ptr_ui_controls
      - ptr_ui_plot
      - ptr_ui_error
      - ptr_ui_code
      - ptr_ui_shared_panel
      - ptr_ui_inline_error
      - ptr_ui_toggle_code
      - ptr_ui_assets
  - title: Linked selection (plotly)
    desc: L3 custom-render helpers that turn a drawn ggpaintr plot into an interactive plotly widget and read its brushed selection back as data. See `ptr_server()`, section "Custom render (L3)".
    contents:
      - ptr_ggplotly
      - ptr_plotly_selection
  - title: Advanced embedders
    desc: Drive the typed tree programmatically or read runtime outputs off the returned state.
    contents:
      - ptr_init_state
      - ptr_extract_plot
      - ptr_extract_error
      - ptr_extract_code
      - ptr_gg_extra
      - ptr_resolve_ui_text
      - ptr_id_table
  - title: Placeholder authors
    desc: Register supported custom placeholder types and their UI hooks without editing package internals.
    contents:
      - ptr_define_placeholder_value
      - ptr_define_placeholder_consumer
      - ptr_define_placeholder_source
      - ptr_clear_placeholder
      - build_ui_for
      - ptr_arg_validators
      - embellish_helpers
      - ptr_constant_fold_registry
      - ptr_signal_partial
  - title: LLM tooling
    desc: Expose ggpaintr's documentation bundle to ellmer-backed coding assistants.
    contents:
      - ptr_llm_primer
      - ptr_llm_topic
      - ptr_llm_topics
      - ptr_llm_register
articles:
  - title: Guides
    navbar: ggpaintr
    contents:
      - ggpaintr-tutorial
